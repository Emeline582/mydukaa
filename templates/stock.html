{% extends 'base.html' %}
{% block title %} products {% endblock %}
{% block content %}

<div>
    <p>This is the stock page</p>
    <div>
        <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Making sales</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
         <div>
        <form action="/add_products" method="post">
  <div class="mb-3">
    <label  class="form-label">Stock ID</label>
    <input type="text" name="p_name" class="form-control" id="exampleInputtext1" ">
    <div id="emailHelp" class="form-text">.</div>
  </div>
  <div>
    <select class="form-select" aria-label="Default select example" name="pid">
  <option selected> select product</option>
  {% for product in products %}
  <option value="{{ product[0] }}">{{ product[1] }}</option>
  {% endfor %}
</select>
  </div>
 <div class="mb-3">
    <label  class="form-label">Stock Quantity</label>
    <input type="number" name="s_price" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3">
    <label  class="form-label">Created at</label>
    <input type="number" name="s_price" class="form-control" id="exampleInputPassword1">
  </div>
  <button type="submit" class="btn btn-primary">Add stock</button>
        </form>
    </div>
        ...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
    </div>
    
    
    <div>
        <table id="example" class="table table-striped">
            <thead>
                <tr>
                    <th>Stock ID</th>
                    <th>Product ID</th>
                    <th>Stock quantity</th>
                    <th>Created at </th>

                </tr>
            </thead>
            <tbody>
                {% for i in stock_data %}
                <tr>
                    <td>{{ i[0] }}</td>
                    <td>{{ i[1] }}</td>
                    <td> {{ i[2] }}</td>
                    <td> {{ i[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
